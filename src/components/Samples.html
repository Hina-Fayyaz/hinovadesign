<section id="work">
  <div class="work-showcase">

    <div class="work-header">
      <div class="work-header-copy">
        <div class="section-eyebrow">
          <span class="tag">FEATURED WORK</span>
        </div>

        <p class="section-heading-pink">My work, doing</p>
        <h2 class="section-heading-white">the talking for me</h2>

        <p class="work-subtext">
          A selection of thoughtfully designed workbooks, courses,
          digital resources, and interactive documents.
        </p>
      </div>

      <div class="work-nav-arrows">
        <button
          class="nav-arrow"
          id="prevArrow"
          type="button"
          onclick="changeSlide(-1)"
          aria-label="View previous portfolio projects"
        >
          <i class="fas fa-arrow-left" aria-hidden="true"></i>
        </button>

        <button
          class="nav-arrow"
          id="nextArrow"
          type="button"
          onclick="changeSlide(1)"
          aria-label="View next portfolio projects"
        >
          <i class="fas fa-arrow-right" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div
      class="work-cards"
      id="workCarousel"
      aria-label="Featured portfolio projects"
    >
      <article class="work-card" style="--i: 0">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/12.png"
            alt="Interactive workbook design project"
            loading="eager"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Workbook Design</span>
        </div>
      </article>

      <article class="work-card" style="--i: 1">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/13.png"
            alt="Online course design project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Course Design</span>
        </div>
      </article>

      <article class="work-card" style="--i: 2">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/2.png"
            alt="Digital journal design project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Digital Journal</span>
        </div>
      </article>

      <article class="work-card" style="--i: 3">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/14.png"
            alt="Interactive fillable form project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Fillable Forms</span>
        </div>
      </article>

      <article class="work-card" style="--i: 4">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/15.png"
            alt="Brand guide design project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Brand Guide</span>
        </div>
      </article>

      <article class="work-card" style="--i: 5">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/3.png"
            alt="Course resource kit design project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Course Kit</span>
        </div>
      </article>

      <article class="work-card" style="--i: 6">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/nutrition-starter-pack.png"
            alt="Nutrition starter guide design project"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Nutrition Guide</span>
        </div>
      </article>
    </div>

  </div>
</section>
