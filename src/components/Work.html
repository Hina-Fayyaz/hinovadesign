<section id="work">
  <div class="work-header">
    <div class="work-header-copy">
      <div class="section-eyebrow"><span class="tag">FEATURED WORK</span></div>
      <p class="section-heading-pink">My work, doing</p>
      <p class="section-heading-white">the talking&nbsp;for me</p>
      <p class="work-subtext">A selection of projects where empathy meets execution.</p>
    </div>
    <div class="work-nav-arrows">
      <button class="nav-arrow" id="prevArrow" onclick="changeSlide(-1)" aria-label="Previous">
        <i class="fas fa-arrow-left"></i>
      </button>
      <button class="nav-arrow" id="nextArrow" onclick="changeSlide(1)" aria-label="Next">
        <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <div class="work-cards" id="workCarousel">
    <div class="work-card">
      <img class="card-img" src="assets/images/work-1.png" alt="Course Design" />
      <div class="card-gradient"></div>
      <span class="card-label">Course Design</span>
    </div>
    <div class="work-card">
      <img class="card-img" src="assets/images/work-3.png" alt="Worksheet design" />
      <div class="card-gradient"></div>
      <span class="card-label">Worksheet design</span>
    </div>
    <div class="work-card">
      <img class="card-img" src="assets/images/work-5.png" alt="Fillable Forms" />
      <div class="card-gradient"></div>
      <span class="card-label">Fillable Forms</span>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stat-blob">
      <span class="stat-num lime">250</span>
      <span class="stat-label">Projects<br/>Completed</span>
    </div>
    <div class="stat-blob">
      <span class="stat-num lime" style="font-size:106px;">3</span>
      <span class="stat-label">Years of Experience</span>
    </div>
    <div class="stat-blob">
      <span class="stat-num lime">100</span>
      <span class="stat-label">Worldwide satisfied clients</span>
    </div>
    <div class="stat-blob">
      <span class="stat-num pink">4.9</span>
      <span class="stat-label">Top rated on Upwork</span>
    </div>
  </div>
</section>
