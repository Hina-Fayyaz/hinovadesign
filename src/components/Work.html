<section id="work">
  <div class="work-showcase">

    <div class="work-header">
      <div class="work-header-copy">
        <p class="work-kicker">Featured Work</p>
        <h2 class="work-title">Work That <em>Speaks</em> for Itself</h2>
      </div>
    </div>

    <div class="work-carousel-shell">
      <button
        class="nav-arrow work-side-arrow work-side-arrow-left"
        id="prevArrow"
        type="button"
        onclick="changeSlide(-1)"
        aria-label="View previous portfolio projects"
      >
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
      </button>

      <div
        class="work-cards"
        id="workCarousel"
        aria-label="Featured portfolio projects"
      >
      <article class="work-card" style="--i: 0">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Book%20Design.png"
            alt="Book design portfolio mockup"
            loading="eager"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Book Design</span>
        </div>
      </article>

      <article class="work-card" style="--i: 1">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Course%20Materials.png"
            alt="Course materials portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Course Materials</span>
        </div>
      </article>

      <article class="work-card" style="--i: 2">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Fillable%20Forms.png"
            alt="Fillable forms portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Fillable Forms</span>
        </div>
      </article>

      <article class="work-card" style="--i: 3">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Journals.png"
            alt="Journal design portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Journals</span>
        </div>
      </article>

      <article class="work-card" style="--i: 4">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/PDF%20Design.png"
            alt="PDF design portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">PDF Design</span>
        </div>
      </article>

      <article class="work-card" style="--i: 5">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Presskits%20and%20One%20Pagers.png"
            alt="Press kit and one-pager portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Press Kits &amp; One-Pagers</span>
        </div>
      </article>

      <article class="work-card" style="--i: 6">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Workbooks.png"
            alt="Workbook design portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Workbooks</span>
        </div>
      </article>

      <article class="work-card" style="--i: 7">
        <div class="card-media">
          <img
            class="card-img"
            src="assets/images/Featured%20Work/Worksheets.png"
            alt="Worksheet design portfolio mockup"
            loading="lazy"
          />
        </div>

        <div class="card-info">
          <span class="card-label">Worksheets</span>
        </div>
      </article>
      </div>

      <button
        class="nav-arrow work-side-arrow work-side-arrow-right"
        id="nextArrow"
        type="button"
        onclick="changeSlide(1)"
        aria-label="View next portfolio projects"
      >
        <i class="fas fa-arrow-right" aria-hidden="true"></i>
      </button>
    </div>

  </div>
</section>
