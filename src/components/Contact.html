<section id="contact">
  <div class="contact-left">
    <h2 class="contact-heading">
      <span class="pink">Let's make it</span><br>
      <span class="dark">beautiful!</span>
    </h2>
    <p class="contact-body">Have a workbook, course, digital resource, or form in mind? Share a little about your project, and I'll help you turn your ideas into a polished experience that feels clear, engaging, and uniquely yours.</p>
    <a class="contact-email-bar" href="mailto:hina@hinovadesign.com">
      <i class="fas fa-envelope"></i>
      <span>hina@hinovadesign.com</span>
    </a>
  </div>

  <form class="contact-form" id="contact-form" novalidate>
    <input name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;">
    <div class="form-group">
      <label class="form-label" for="contact-name">Your Name</label>
      <input class="form-input" id="contact-name" name="name" type="text" autocomplete="name" placeholder="Jane Smith" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="contact-email">Email Address</label>
      <input class="form-input" id="contact-email" name="email" type="email" autocomplete="email" placeholder="jane@company.com" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="contact-message">Message</label>
      <textarea class="form-textarea" id="contact-message" name="message" placeholder="Tell me about your project…" required></textarea>
    </div>
    <div class="contact-submit-row">
      <button class="contact-send button-primary" type="submit">
        <span class="contact-send-label">Start Your Project</span>
        <span class="contact-send-arrow button-arrow" aria-hidden="true">→</span>
      </button>
    </div>
    <p class="contact-status" id="contact-status" role="status" aria-live="polite"></p>
    <p class="contact-note"><i class="fa-regular fa-clock" aria-hidden="true"></i> I typically respond within 1–2 business days.</p>
  </form>
</section>
