<section id="contact">
  <div class="contact-left">
    <h2 class="contact-heading">
      <span class="pink">Let's create </span><span class="dark">something</span><br/>
      <span class="dark">beautiful together!</span>
    </h2>
    <p class="contact-body">Have a workbook, course, digital resource, or form in mind? Share a little about your project, and I’ll help you turn your ideas into a polished experience that feels clear, engaging, and uniquely yours.</p>
    <div class="contact-email-bar">
      <i class="fas fa-envelope"></i>
      <span>hina@hinovadesign.com</span>
    </div>
  </div>

  <div class="contact-form">
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input class="form-input" type="text" placeholder="Jane Smith" />
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" placeholder="jane@company.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-textarea" placeholder="Tell me about your project…"></textarea>
    </div>
    <button class="btn-green" style="font-size:20px;padding:14px 36px;" type="button" onclick="sendMessage(this)">
      Start Your Project →
    </button>
  </div>
</section>
